name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Run Scraper
        run: python scripts/update_data.py
        
      - name: Commit Data Update
        run: |
          git config --local user.email "LIN4CRE@users.noreply.github.com"
          git config --local user.name "David Linacre"
          git add src/data/models.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "bot: Automated daily LLM data sync" && git push)
      
      - name: Move assets for Pages
        run: |
          mkdir -p public
          cp -r src/* public/
          cp -r assets public/assets
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
